<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>


<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
}

.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

.card {
    width: 550px;
    padding: 50px;
    border-radius: 30px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px;
    width: 100%;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
}

.grid {
    display: flex;
    justify-content: space-around;
    padding: 60px;
}

.big-card {
    width: 40%;
    padding: 60px;
    border-radius: 70px;
    background: rgba(255,255,255,0.2);
    text-align: center;
    cursor: pointer;
    font-size: 22px;
}

.exp-list {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.exp {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 12px;
}

.exp-actions button {
    width: auto;
    padding: 6px 12px;
}

.hidden { display: none; }
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="center">
    <div class="card">
        <h2>💰 Expense Tracker</h2>
        <button type="button" onclick="showLogin(); return false;">Login</button>
        <button type="button" onclick="showSignup(); return false;">Signup</button>
    </div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="center hidden">
    <div class="card">
        <h2>Login</h2>
        <input id="loginUser" placeholder="Username">
        <input id="loginPass" type="password" placeholder="Password">
        <button type="button" onclick="login(); return false;">Login</button>
        <button type="button" onclick="goHome(); return false;">Back</button>
    </div>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="center hidden">
    <div class="card">
        <h2>Signup</h2>
        <input id="signupUser" placeholder="Username">
        <input id="signupEmail" placeholder="Email">
        <input id="signupPass" type="password" placeholder="Password">
        <button type="button" onclick="signup(); return false;">Signup</button>
        <button type="button" onclick="goHome(); return false;">Back</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <h1 style="text-align:center;color:white;">Dashboard</h1>

    <div class="grid">
        <div class="big-card" onclick="openAdd()">➕ Add Expense</div>
        <div class="big-card" onclick="openView()">📊 View Expenses</div>
    </div>

    <div style="text-align:center;">
        <button type="button" onclick="logout(); return false;">Logout</button>
    </div>
</div>

<!-- ADD -->
<div id="addPage" class="center hidden">
    <div class="card">
        <h2>Add Expense</h2>
        <input id="amount" placeholder="Amount">
        <input id="category" placeholder="Category">
        <input id="description" placeholder="Description">
        <button type="button" onclick="addExpense(); return false;">Add</button>
        <button type="button" onclick="back(); return false;">Back</button>
    </div>
</div>

<!-- VIEW -->
<div id="viewPage" class="center hidden">
    <div class="card" style="width:600px; max-height:80vh; overflow-y:auto;">

        <div style="display:flex;justify-content:space-between;">
            <h2>Your Expenses</h2>
            <button type="button" onclick="back(); return false;" style="width:auto;">⬅</button>
        </div>

        <input id="filterCat" placeholder="Filter by category">
        <button type="button" onclick="filterExpenses(); return false;">Filter</button>
        <button type="button" onclick="loadExpenses(); return false;">Load All</button>

        <div id="list" class="exp-list"></div>

    </div>
</div>

<script>

const API = "http://127.0.0.1:8000";

// AUTO LOGIN
window.onload = () => {
    if(localStorage.getItem("token")){
        showDashboard();
    }
};
window.onbeforeunload = function () {
    return null;
};
// NAV
function showLogin(){ home.classList.add("hidden"); loginPage.classList.remove("hidden"); }
function showSignup(){ home.classList.add("hidden"); signupPage.classList.remove("hidden"); }
function goHome(){ loginPage.classList.add("hidden"); signupPage.classList.add("hidden"); home.classList.remove("hidden"); }

function showDashboard(){
    home.classList.add("hidden");
    loginPage.classList.add("hidden");
    signupPage.classList.add("hidden");
    dashboard.classList.remove("hidden");
}

function openAdd(){ dashboard.classList.add("hidden"); addPage.classList.remove("hidden"); }
function openView(){ dashboard.classList.add("hidden"); viewPage.classList.remove("hidden"); }

function back(){
    addPage.classList.add("hidden");
    viewPage.classList.add("hidden");
    dashboard.classList.remove("hidden");
}

// AUTH
async function signup(){
    await fetch(`${API}/signup?username=${signupUser.value}&email=${signupEmail.value}&password=${signupPass.value}`, {method:"POST"});
    alert("Signup successful!");
    goHome();
}

async function login(){
    let res = await fetch(`${API}/login?username=${loginUser.value}&password=${loginPass.value}`, {method:"POST"});
    let data = await res.json();

    if(!data.access_token){
        alert("Invalid login");
        return;
    }

    localStorage.setItem("token", data.access_token);
    showDashboard();
}

function logout(){
    localStorage.removeItem("token");
    location.reload();
}

// HEADERS
function headers(){
    return { "Authorization": "Bearer " + localStorage.getItem("token") };
}

// ADD
async function addExpense(){
    await fetch(`${API}/add-expense?amount=${amount.value}&category=${category.value}&description=${description.value}`, {
        method:"POST",
        headers: headers()
    });

    alert("Added!");
    amount.value = "";
    category.value = "";
    description.value = "";
}

// LOAD
async function loadExpenses(){
    let res = await fetch(`${API}/expenses`, { headers: headers() });
    let data = await res.json();
    render(data.expenses);
}

// FILTER
async function filterExpenses(){
    let res = await fetch(`${API}/expenses?category=${filterCat.value}`, { headers: headers() });
    let data = await res.json();
    render(data.expenses);
}

// RENDER
function render(expenses){
    list.innerHTML = "";

    expenses.forEach(e=>{
        list.innerHTML += `
        <div class="exp">
            ₹${e.amount} — ${e.category} (${e.description})
            <div class="exp-actions">
                <button type="button" onclick="deleteExp(${e.id}); return false;">Delete</button>
                <button type="button" onclick="updateExp(${e.id}); return false;">Update</button>
            </div>
        </div>`;
    });
}

// DELETE
async function deleteExp(id){
    await fetch(`${API}/delete-expense/${id}`, {
        method:"DELETE",
        headers: headers()
    });
    loadExpenses();
}

// UPDATE
async function updateExp(id){
    let amt = prompt("New amount:");
    let cat = prompt("New category:");
    let desc = prompt("New description:");

    await fetch(`${API}/update-expense/${id}?amount=${amt}&category=${cat}&description=${desc}`, {
        method:"PUT",
        headers: headers()
    });

    loadExpenses();
}

</script>

</body>
</html>
